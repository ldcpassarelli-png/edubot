# EduBot — Docker Compose para desenvolvimento local
# Sobe PostgreSQL + Redis localmente

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edubot
      POSTGRES_PASSWORD: edubot
      POSTGRES_DB: edubot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
