# Alembic — Configuração de migrations do EduBot
# A URL do banco é lida do env.py (via DATABASE_URL), NÃO daqui.

[alembic]
script_location = alembic
prepend_sys_path = .

# URL vazia de propósito — env.py resolve via variável de ambiente.
# Isso impede que alguém cole URL de produção aqui sem querer.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
